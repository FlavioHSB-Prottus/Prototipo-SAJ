{% extends 'layout.html' %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='busca.css') }}">
<style>
    #insertModal .modal-container {
        width: 96vw;
        max-width: 980px;
    }
    #insertModal .modal-body {
        overflow-x: hidden;
        max-height: 72vh;
    }
    .pv-insert-form {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 14px;
    }
    .pv-insert-form .form-group {
        width: 100%;
    }
    .pv-insert-form .form-control {
        width: 100%;
        max-width: 100%;
    }
    .pv-insert-form textarea.form-control {
        min-height: 120px;
        height: auto;
        resize: vertical;
        padding-top: 10px;
        padding-bottom: 10px;
    }
    .pv-desc-cell {
        padding: 10px 14px 14px 14px !important;
        background: var(--card-bg, rgba(0,0,0,.04));
        border-top: 1px solid var(--border-color, rgba(0,0,0,.08));
        vertical-align: top;
    }
    .pv-desc-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-muted);
        margin-bottom: 6px;
    }
    .pv-desc-text {
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 0.9rem;
        line-height: 1.45;
        color: var(--text);
        max-height: 220px;
        overflow-y: auto;
    }
</style>
{% endblock %}

{% block content %}
<div class="busca-wrapper">
    <div class="results-card table-section" id="pastaVirtualSection">
        <div class="table-header">
            <h3 id="pvTitle"><i class="fa-solid fa-folder-open"></i> Pasta Virtual</h3>
            <button type="button" class="btn-search" id="btnNovoPV" style="max-width:220px">
                <i class="fa-solid fa-plus"></i> Novo registro
            </button>
        </div>
        <div class="table-responsive">
            <table class="styled-table busca-results-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Contrato</th>
                        <th>Devedor</th>
                        <th>Funcionario</th>
                        <th>Arquivo</th>
                        <th>Status Contrato</th>
                        <th class="text-right">Acoes</th>
                    </tr>
                </thead>
                <tbody id="pvBody">
                    <tr>
                        <td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted)">
                            <i class="fa-solid fa-spinner fa-spin"></i> Carregando...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="detalhesModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h2 id="modalTitle">Detalhes</h2>
            <button class="close-modal-btn" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" id="modalContent"></div>
    </div>
</div>

<div id="insertModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h2>Novo registro - Pasta Virtual</h2>
            <button class="close-modal-btn" id="closeInsertModalBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <form id="insertForm" class="pv-insert-form" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="pvGrupo">Grupo</label>
                    <input type="text" id="pvGrupo" name="grupo" class="form-control" placeholder="Ex: 001234" required>
                </div>
                <div class="form-group">
                    <label for="pvCota">Cota</label>
                    <input type="text" id="pvCota" name="cota" class="form-control" placeholder="Ex: 0001" required>
                </div>
                <div class="form-group">
                    <label for="pvDescricao">Descricao</label>
                    <textarea id="pvDescricao" name="descricao" class="form-control" placeholder="Digite a descricao do registro" required></textarea>
                </div>
                <div class="form-group">
                    <label for="pvArquivo">Arquivo</label>
                    <input type="file" id="pvArquivo" name="arquivo" class="form-control">
                </div>
                <div id="insertMsg" style="margin:6px 0 12px;color:#ef4444;display:none"></div>
                <div style="display:flex;gap:8px;justify-content:flex-end">
                    <button type="button" class="btn-secondary" id="cancelInsertBtn">Cancelar</button>
                    <button type="submit" class="btn-search" style="max-width:180px">
                        <i class="fa-solid fa-floppy-disk"></i> Inserir
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.querySelector('.module-title').textContent = 'Pasta Virtual';
</script>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='pasta_virtual.js') }}"></script>
{% endblock %}
