{% extends 'layout.html' %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='busca.css') }}">
<style>
    .pv-desc-cell {
        padding: 10px 14px 14px 14px !important;
        background: var(--card-bg, rgba(0,0,0,.04));
        border-top: 1px solid var(--border-color, rgba(0,0,0,.08));
        vertical-align: top;
    }
    .pv-desc-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-muted);
        margin-bottom: 6px;
    }
    .pv-desc-text {
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 0.9rem;
        line-height: 1.45;
        color: var(--text);
        max-height: 220px;
        overflow-y: auto;
    }
</style>
{% endblock %}

{% block content %}
<div class="busca-wrapper">
    <div class="filter-card">
        <h3><i class="fa-solid fa-filter"></i> Filtros</h3>
        <form id="pvFilterForm" class="filter-form">
            <div class="form-group">
                <label for="filtroContrato">Contrato (grupo/cota)</label>
                <input type="text" id="filtroContrato" class="form-control" placeholder="Ex: 001234/0001 ou 001234" autocomplete="off">
            </div>
            <div class="form-group">
                <label for="filtroFuncionario">Funcionario</label>
                <select id="filtroFuncionario" class="form-control">
                    <option value="">Todos</option>
                </select>
            </div>
            <button type="submit" class="btn-search"><i class="fa-solid fa-magnifying-glass"></i> Filtrar</button>
            <button type="button" class="btn-secondary" id="btnLimparPV">Limpar</button>
        </form>
    </div>
    <div class="results-card table-section" id="pastaVirtualSection">
        <div class="table-header">
            <h3 id="pvTitle"><i class="fa-solid fa-folder-open"></i> Pasta Virtual</h3>
            <button type="button" class="btn-search" id="btnNovoPV" style="max-width:220px">
                <i class="fa-solid fa-plus"></i> Novo registro
            </button>
        </div>
        <div class="table-responsive">
            <table class="styled-table busca-results-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Contrato</th>
                        <th>Devedor</th>
                        <th>Funcionario</th>
                        <th>Arquivo</th>
                        <th>Status Contrato</th>
                        <th class="text-right">Acoes</th>
                    </tr>
                </thead>
                <tbody id="pvBody">
                    <tr>
                        <td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted)">
                            <i class="fa-solid fa-spinner fa-spin"></i> Carregando...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="detalhesModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h2 id="modalTitle">Detalhes</h2>
            <button class="close-modal-btn" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" id="modalContent"></div>
    </div>
</div>

<script>
    document.querySelector('.module-title').textContent = 'Pasta Virtual';
</script>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='pasta_virtual.js') }}"></script>
{% endblock %}
