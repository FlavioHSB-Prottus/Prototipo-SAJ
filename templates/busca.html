{% extends 'layout.html' %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='busca.css') }}">
{% endblock %}

{% block content %}
<div class="busca-wrapper">
    
    <!-- Filtros de Busca -->
    <div class="filter-card">
        <h3><i class="fa-solid fa-filter"></i> Busca no Sistema</h3>
        <form id="searchForm" class="filter-form">
            
            <div class="form-group">
                <label for="tipo_busca">Tipo de Busca</label>
                <select id="tipo_busca" name="tipo_busca" class="form-control">
                    <option value="pessoa">Pessoa (Nome ou CPF)</option>
                    <option value="contrato">Contrato (Grupo / Cota)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="termo">Termo da Busca</label>
                <input type="text" id="termo" name="termo" class="form-control" placeholder="Digite o nome ou CPF...">
            </div>

            <div class="form-group d-none" id="statusGroup">
                <label for="status_filtro">Status</label>
                <select id="status_filtro" name="status_filtro" class="form-control">
                    <option value="">Todos</option>
                    <option value="aberto">Aberto</option>
                    <option value="fechado">Fechado</option>
                    <option value="indenizado">Indenizado</option>
                </select>
            </div>
            
            <button type="submit" class="btn-search"><i class="fa-solid fa-magnifying-glass"></i> Pesquisar</button>
            <button type="reset" class="btn-secondary" id="btnLimpar">Limpar</button>
            
        </form>
    </div>

    <!-- Resultados -->
    <div class="results-card table-section d-none" id="resultsSection">
        <div class="table-header">
            <h3 id="resultsTitle">Resultados da Busca</h3>
        </div>
        <div class="table-responsive">
            <table class="styled-table">
                <thead id="resultsHead">
                    <tr></tr>
                </thead>
                <tbody id="resultsBody">
                </tbody>
            </table>
        </div>
        <div class="no-results d-none" id="noResults">
            <p><i class="fa-solid fa-circle-exclamation"></i> Nenhum resultado encontrado para o termo informado.</p>
        </div>
    </div>

</div>

<!-- Modal de Detalhes -->
<div id="detalhesModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h2 id="modalTitle">Detalhes</h2>
            <button class="close-modal-btn" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" id="modalContent">
        </div>
    </div>
</div>

<script>
    document.querySelector('.module-title').textContent = 'Busca por Contratos';
</script>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='busca.js') }}"></script>
{% endblock %}
