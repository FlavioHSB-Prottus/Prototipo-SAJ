<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>João Barbosa - Recuperar Senha</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-container">
                <img src="{{ url_for('static', filename='imagens/logo.png') }}" alt="Logo João Barbosa" class="logo">
            </div>

            <h1 class="login-title">Recuperar Senha</h1>
            <p class="login-subtitle">Informe seu e-mail para receber as instruções</p>

            <form action="{{ url_for('login') }}" method="GET" class="login-form">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail cadastrado" required
                        autofocus>
                </div>

                <div class="forgot-password" style="text-align: left;">
                    <a href="{{ url_for('login') }}">Voltar para o login</a>
                </div>

                <button type="submit" class="login-button">Enviar link</button>
            </form>
        </div>
    </div>
</body>

</html>
