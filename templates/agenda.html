{% extends 'layout.html' %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='busca.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='agenda.css') }}">
{% endblock %}

{% block content %}
<div class="agenda-wrapper">

    <!-- Card do CALENDÁRIO -->
    <div class="calendar-card">
        
        <div class="calendar-header">
            <button class="nav-btn"><i class="fa-solid fa-chevron-left"></i></button>
            <h2 class="month-title">Abril 2026</h2>
            <button class="nav-btn"><i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <div class="calendar-body">
            <!-- Cabeçalho (Dias da semana) -->
            <div class="calendar-grid headers">
                <div class="day-name">Dom</div>
                <div class="day-name">Seg</div>
                <div class="day-name">Ter</div>
                <div class="day-name">Qua</div>
                <div class="day-name">Qui</div>
                <div class="day-name">Sex</div>
                <div class="day-name">Sáb</div>
            </div>

            <!-- Dias do Mês (injetado via JS) -->
            <div id="calendarGrid" class="calendar-grid days">
                
            </div>
        </div>
    </div>

    <!-- TAREFAS DO DIA -->
    <div class="tasks-card">
        <div class="tasks-header">
            <h3><i class="fa-solid fa-list-check"></i> Tarefas de Hoje (16/04/2026)</h3>
            <button class="btn-new-task"><i class="fa-solid fa-plus"></i> Nova Tarefa</button>
        </div>

        <div id="tasksList" class="tasks-list">
            
        </div>
    </div>

</div>

<!-- Modal Nova Tarefa -->
<div class="modal-overlay" id="agendaModal">
    <div class="modal-container" style="max-width: 600px;">
        <div class="modal-header">
            <h2><i class="fa-solid fa-calendar-plus"></i> <span class="text-accent">Nova Tarefa</span></h2>
            <button class="close-modal-btn" id="closeAgendaModal"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="gap: 16px;">
            <div class="form-group" style="grid-column: 1 / -1;">
                <label>Atividade</label>
                <input type="text" id="agendaAtividade" class="form-control" placeholder="Título da tarefa">
            </div>
            
            <div class="form-group" style="grid-column: 1 / -1;">
                <label>Descrição</label>
                <textarea id="agendaDescricao" class="form-control" rows="3" placeholder="Detalhes (opcional)"></textarea>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group">
                    <label>Data e Hora</label>
                    <input type="datetime-local" id="agendaData" class="form-control">
                </div>
                <div class="form-group">
                    <label>Prioridade</label>
                    <select id="agendaPrioridade" class="form-control">
                        <option value="baixa">Baixa</option>
                        <option value="media" selected>Média</option>
                        <option value="alta">Alta</option>
                    </select>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group">
                    <label>Atribuir a</label>
                    <select id="agendaFuncionario" class="form-control"></select>
                </div>
                <div class="form-group">
                    <label>Contrato (Opçional)</label>
                    <input type="text" id="agendaContrato" class="form-control" placeholder="Ex: 50A/0101">
                </div>
            </div>

            <button id="btnSaveAgenda" class="btn-search" style="margin-top: 16px; justify-content: center; width: 100%;">
                <i class="fa-solid fa-check"></i> Salvar Tarefa
            </button>
        </div>
    </div>
</div>

<!-- Modal Detalhes do Contrato -->
<div class="modal-overlay" id="detalhesModal">
    <div class="modal-container">
        <div class="modal-header">
            <h2 id="modalTitle">Detalhes</h2>
            <button class="close-modal-btn" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" id="modalContent">
            <!-- Conteúdo será injetado aqui dinamicamente -->
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='agenda.js') }}"></script>
    </div>

</div>

<script>
    document.querySelector('.module-title').textContent = 'Agenda Diária';
</script>
{% endblock %}
