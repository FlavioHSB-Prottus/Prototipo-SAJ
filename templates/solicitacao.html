{% extends 'layout.html' %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='busca.css') }}">
{% endblock %}

{% block content %}
<div class="busca-wrapper">
    <div class="results-card table-section">
        <div class="table-header">
            <h3><i class="fa-solid fa-file-circle-question"></i> Solicitações</h3>
            <div class="table-header-actions">
                <span class="badge bg-primary" id="totalCount">0 registros</span>
            </div>
        </div>
        <div class="table-responsive">
            <table class="styled-table" id="solicitacaoTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Remetente</th>
                        <th>Destinatário</th>
                        <th>Data Aguardar</th>
                        <th>Data Envio</th>
                        <th>Contrato</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="solicitacaoBody">
                    <tr><td colspan="7" class="text-center">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal de Detalhes -->
<div id="detalhesModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h2 id="modalTitle">Detalhes da Solicitação</h2>
            <button class="close-modal-btn" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" id="modalContent">
        </div>
    </div>
</div>

<script>
    document.querySelector('.module-title').textContent = 'Solicitações';
</script>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/solicitacoes')
        .then(res => res.json())
        .then(data => {
            const body = document.getElementById('solicitacaoBody');
            const totalCount = document.getElementById('totalCount');
            totalCount.textContent = `${data.total} registros`;
            body.innerHTML = '';
            if (data.results.length === 0) {
                body.innerHTML = '<tr><td colspan="7" class="text-center">Nenhuma solicitação encontrada.</td></tr>';
                return;
            }
            data.results.forEach(s => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${s.id}</td>
                    <td>${s.remetente_nome || ''}</td>
                    <td>${s.destinatario_nome || ''}</td>
                    <td>${s.data_aguardar || ''}</td>
                    <td>${s.data_envio || ''}</td>
                    <td>${s.grupo ? s.grupo + '/' + s.cota : '—'}</td>
                    <td>
                        <button class="action-btn view-btn" data-id="${s.id}"><i class="fa-solid fa-eye"></i> Ver</button>
                    </td>
                `;
                body.appendChild(tr);
            });

            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.dataset.id;
                    const s = data.results.find(x => x.id == id);
                    const modal = document.getElementById('detalhesModal');
                    const content = document.getElementById('modalContent');
                    content.innerHTML = `
                        <div class="detail-grid">
                            <div class="detail-item"><strong>Remetente:</strong> ${s.remetente_nome}</div>
                            <div class="detail-item"><strong>Destinatário:</strong> ${s.destinatario_nome}</div>
                            <div class="detail-item"><strong>Data Aguardar:</strong> ${s.data_aguardar}</div>
                            <div class="detail-item"><strong>Data Envio:</strong> ${s.data_envio}</div>
                            <div class="detail-item full-width"><strong>Descrição:</strong><br>${s.descricao || 'Sem descrição'}</div>
                        </div>
                    `;
                    modal.classList.add('active');
                });
            });
        });

    document.getElementById('closeModalBtn').addEventListener('click', () => {
        document.getElementById('detalhesModal').classList.remove('active');
    });
});
</script>
<style>
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 10px; }
.detail-item { font-size: 0.95rem; }
.detail-item.full-width { grid-column: span 2; border-top: 1px solid #eee; padding-top: 10px; }
</style>
{% endblock %}
