{% extends 'layout.html' %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='busca.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='cobranca.css') }}">
{% endblock %}

{% block content %}
<div class="cobranca-wrapper">

    <!-- Barra de Pesquisa -->
    <div class="cobranca-search-bar">
        <div class="search-bar-icon">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
        <select id="searchType" class="search-type-select">
            <option value="all">Todos os campos</option>
            <option value="cpf">CPF / CNPJ</option>
            <option value="nome">Nome</option>
            <option value="grupo_cota">Grupo & Cota</option>
            <option value="bem">Bem</option>
        </select>
        <div class="search-divider"></div>
        <input type="text" id="searchInput" class="search-input" placeholder="Pesquisar contratos..." autocomplete="off">
        <button type="button" id="btnSearchClear" class="search-clear-btn" title="Limpar pesquisa" style="display:none;">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <!-- Toolbar Superior -->
    <div class="cobranca-toolbar">
        <div class="toolbar-left">
            <h3><i class="fa-solid fa-hand-holding-dollar"></i> Painel de Cobrança</h3>
            <div class="operador-filter">
                <label for="operadorSelect"><i class="fa-solid fa-user-tie"></i> Operador:</label>
                <select id="operadorSelect" class="form-control-sm">
                    <option value="">Todos os Operadores</option>
                    <!-- Preenchido dinamicamente via JS -->
                </select>
            </div>
        </div>
        <div class="toolbar-right">
            <div class="view-toggle" role="group" aria-label="Alternar layout">
                <button type="button" class="view-toggle-btn active" data-view="analitico" id="btnViewAnalitico">
                    <i class="fa-solid fa-list"></i>
                    <span>Analítico</span>
                </button>
                <button type="button" class="view-toggle-btn" data-view="kanban" id="btnViewKanban">
                    <i class="fa-solid fa-table-columns"></i>
                    <span>Quadro Kanban</span>
                </button>
            </div>
            <div class="toolbar-kpi">
                <i class="fa-solid fa-folder-open"></i>
                Total em Cobrança: <span class="kpi-num" id="toolbarTotal">—</span>
            </div>
        </div>
    </div>

    <!-- Loading State -->
    <div class="cobranca-loading" id="loadingState">
        <i class="fa-solid fa-spinner fa-spin"></i>
        <p>Carregando contratos em cobrança...</p>
    </div>

    <!-- Blocos de Prioridade - visão Analítica (gerados via JS) -->
    <div id="blocksContainer"></div>

    <!-- Quadro Kanban - 3 colunas verticais (gerados via JS) -->
    <div id="kanbanContainer" class="kanban-board" style="display:none;"></div>

    <!-- Rodapé com Totais -->
    <div class="cobranca-footer">
        <div class="footer-total">
            <i class="fa-solid fa-calculator"></i>
            Total de Contratos: <span class="total-num" id="totalDisplay">—</span>
        </div>
        <div class="footer-breakdown">
            <div class="fb-item">
                <span class="fb-dot dot-critico"></span>
                Crítico: <strong id="footerCritico">0</strong>
            </div>
            <div class="fb-item">
                <span class="fb-dot dot-atencao"></span>
                Atenção: <strong id="footerAtencao">0</strong>
            </div>
            <div class="fb-item">
                <span class="fb-dot dot-recente"></span>
                Recente: <strong id="footerRecente">0</strong>
            </div>
        </div>
    </div>

</div>

<!-- Modal de Detalhes (mesmo padrão da busca) -->
<div id="detalhesModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h2 id="modalTitle">Detalhes</h2>
            <button class="close-modal-btn" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" id="modalContent">
        </div>
    </div>
</div>

<script>
    document.querySelector('.module-title').textContent = 'Cobrança';
</script>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='cobranca.js') }}"></script>
{% endblock %}
