{% extends 'layout.html' %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='busca.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='operadores.css') }}">
{% endblock %}

{% block content %}
<div class="operadores-wrapper">

    <!-- Filtros -->
    <div class="operadores-filters" id="filtersBar">
        <div class="filter-group">
            <label for="filterOperador"><i class="fa-solid fa-user-tie"></i> Operador</label>
            <select id="filterOperador" class="filter-select">
                <option value="">Todos os Operadores</option>
                <!-- Preenchido via JS -->
            </select>
        </div>

        <div class="filter-group">
            <label for="filterSituacao"><i class="fa-solid fa-flag"></i> Situação</label>
            <select id="filterSituacao" class="filter-select">
                <option value="">Todas</option>
                <option value="critico">Crítico (+61 dias)</option>
                <option value="atencao">Atenção (31-60 dias)</option>
                <option value="recente">Recente (até 30 dias)</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="filterStatusOperador"><i class="fa-solid fa-user-check"></i> Status</label>
            <select id="filterStatusOperador" class="filter-select">
                <option value="">Todos</option>
                <option value="ativo">Ativos</option>
                <option value="inativo">Inativos</option>
                <option value="afastado">Afastados</option>
                <option value="ferias">Férias</option>
            </select>
        </div>

        <div class="filter-search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="filterSearch" class="filter-search-input"
                   placeholder="Pesquisar por Nome, CPF, Grupo/Cota..." autocomplete="off">
            <button type="button" id="btnSearchClear" class="filter-search-clear" title="Limpar">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>

    <!-- KPIs Resumo Geral -->
    <div class="operadores-kpi-row" id="kpiRow">
        <div class="op-kpi-card total">
            <div class="op-kpi-icon"><i class="fa-solid fa-folder-open"></i></div>
            <div class="op-kpi-info">
                <span class="op-kpi-label">Total em Cobrança</span>
                <span class="op-kpi-value" id="kpiTotal">—</span>
            </div>
        </div>
        <div class="op-kpi-card critico">
            <div class="op-kpi-icon"><i class="fa-solid fa-fire"></i></div>
            <div class="op-kpi-info">
                <span class="op-kpi-label">Crítico</span>
                <span class="op-kpi-value" id="kpiCritico">—</span>
            </div>
        </div>
        <div class="op-kpi-card atencao">
            <div class="op-kpi-icon"><i class="fa-solid fa-exclamation-triangle"></i></div>
            <div class="op-kpi-info">
                <span class="op-kpi-label">Atenção</span>
                <span class="op-kpi-value" id="kpiAtencao">—</span>
            </div>
        </div>
        <div class="op-kpi-card recente">
            <div class="op-kpi-icon"><i class="fa-solid fa-clock"></i></div>
            <div class="op-kpi-info">
                <span class="op-kpi-label">Recente</span>
                <span class="op-kpi-value" id="kpiRecente">—</span>
            </div>
        </div>
    </div>

    <!-- Loading State -->
    <div class="operadores-loading" id="loadingState">
        <i class="fa-solid fa-spinner fa-spin"></i>
        <p>Carregando operadores e contratos...</p>
    </div>

    <!-- Blocos de Operadores (gerados via JS) -->
    <div id="operadorBlocksContainer"></div>

    <!-- Rodapé com Totais -->
    <div class="operadores-footer">
        <div class="footer-total">
            <i class="fa-solid fa-calculator"></i>
            Total de Contratos Visíveis: <span class="total-num" id="footerTotal">—</span>
        </div>
        <div class="footer-breakdown">
            <div class="fb-item">
                <span class="fb-dot dot-critico"></span>
                Crítico: <strong id="footerCritico">0</strong>
            </div>
            <div class="fb-item">
                <span class="fb-dot dot-atencao"></span>
                Atenção: <strong id="footerAtencao">0</strong>
            </div>
            <div class="fb-item">
                <span class="fb-dot dot-recente"></span>
                Recente: <strong id="footerRecente">0</strong>
            </div>
        </div>
    </div>

</div>

<!-- Modal de Detalhes -->
<div id="detalhesModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h2 id="modalTitle">Detalhes</h2>
            <button class="close-modal-btn" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" id="modalContent">
        </div>
    </div>
</div>

<script>
    document.querySelector('.module-title').textContent = 'Operadores';
</script>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='operadores.js') }}"></script>
{% endblock %}
