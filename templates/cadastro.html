{% extends 'layout.html' %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='busca.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='cadastro.css') }}">
{% endblock %}

{% block content %}
<div class="cadastro-wrapper">

    <!-- =================== BLOCO CONSORCIADOS =================== -->
    <div class="filter-card">
        <div class="card-header-flex">
            <h3><i class="fa-solid fa-user-tie"></i> Gestão de Consorciados</h3>
            <span class="badge-count" id="consorciados-count">—</span>
        </div>
        <form class="filter-form single-linha" onsubmit="return false;">
            <div class="search-bar-wrapper">
                <select id="filterTypeConsorciados" class="form-control filter-type-select">
                    <option value="nome">Nome</option>
                    <option value="cpf">CPF / CNPJ</option>
                    <option value="grupo_cota">Grupo & Cota</option>
                    <option value="bem">Bem (Descrição)</option>
                </select>
                <input type="text" id="searchConsorciados" class="form-control big-input" placeholder="Buscar por Nome...">
                <button type="button" class="btn-search" id="btnSearchConsorciados">Pesquisar</button>
            </div>
        </form>
    </div>

    <div class="results-card table-section" id="consorciados-results">
        <div class="table-responsive">
            <table class="styled-table col-fixed">
                <thead>
                    <tr>
                        <th width="40%" class="th-sortable sorted-asc" data-field="nome" title="Ordenar por nome" role="button" tabindex="0">
                            <span class="th-sort-label">Nome</span> <span class="sort-icon" aria-hidden="true"><i class="fa-solid fa-sort-up"></i></span>
                        </th>
                        <th width="30%" class="th-sortable" data-field="cpf" title="Ordenar por CPF/CNPJ" role="button" tabindex="0">
                            <span class="th-sort-label">CPF / CNPJ</span> <span class="sort-icon" aria-hidden="true"><i class="fa-solid fa-sort"></i></span>
                        </th>
                        <th width="15%" class="th-sortable" data-field="contratos" title="Ordenar por quantidade de contratos" role="button" tabindex="0">
                            <span class="th-sort-label">Contratos</span> <span class="sort-icon" aria-hidden="true"><i class="fa-solid fa-sort"></i></span>
                        </th>
                        <th width="15%" class="text-right">Ação</th>
                    </tr>
                </thead>
                <tbody id="consorciados-body">
                    <tr><td colspan="4" class="loading-row"><i class="fa-solid fa-spinner fa-spin"></i> Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- =================== BLOCO AVALISTAS =================== -->
    <div class="filter-card">
        <div class="card-header-flex">
            <h3><i class="fa-solid fa-user-shield"></i> Gestão de Avalistas</h3>
            <span class="badge-count" id="avalistas-count">—</span>
        </div>
        <form class="filter-form single-linha" onsubmit="return false;">
            <div class="search-bar-wrapper">
                <select id="filterTypeAvalistas" class="form-control filter-type-select">
                    <option value="nome">Nome</option>
                    <option value="cpf">CPF / CNPJ</option>
                    <option value="grupo_cota">Grupo & Cota</option>
                    <option value="bem">Bem (Descrição)</option>
                </select>
                <input type="text" id="searchAvalistas" class="form-control big-input" placeholder="Buscar por Nome...">
                <button type="button" class="btn-search" id="btnSearchAvalistas">Pesquisar</button>
            </div>
        </form>
    </div>

    <div class="results-card table-section" id="avalistas-results">
        <div class="table-responsive">
            <table class="styled-table col-fixed">
                <thead>
                    <tr>
                        <th width="40%" class="th-sortable sorted-asc" data-field="nome" title="Ordenar por nome" role="button" tabindex="0">
                            <span class="th-sort-label">Nome</span> <span class="sort-icon" aria-hidden="true"><i class="fa-solid fa-sort-up"></i></span>
                        </th>
                        <th width="30%" class="th-sortable" data-field="cpf" title="Ordenar por CPF/CNPJ" role="button" tabindex="0">
                            <span class="th-sort-label">CPF / CNPJ</span> <span class="sort-icon" aria-hidden="true"><i class="fa-solid fa-sort"></i></span>
                        </th>
                        <th width="15%" class="th-sortable" data-field="contratos" title="Ordenar por quantidade de contratos" role="button" tabindex="0">
                            <span class="th-sort-label">Contratos</span> <span class="sort-icon" aria-hidden="true"><i class="fa-solid fa-sort"></i></span>
                        </th>
                        <th width="15%" class="text-right">Ação</th>
                    </tr>
                </thead>
                <tbody id="avalistas-body">
                    <tr><td colspan="4" class="loading-row"><i class="fa-solid fa-spinner fa-spin"></i> Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- Modal de Detalhes da Pessoa -->
<div id="detalhesModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h2 id="modalTitle">Detalhes</h2>
            <button class="close-modal-btn" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" id="modalContent">
        </div>
    </div>
</div>

<script>
    document.querySelector('.module-title').textContent = 'Consorciados e Avalistas';
</script>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='cadastro.js') }}"></script>
{% endblock %}
